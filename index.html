<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olimpo Digital | Mitologia Grega</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <header>
        <nav aria-label="Navegação Principal">
            <div class="logo">Olimpo<span>Digital</span></div>
            <div class="controls">
                <button id="btn-high-contrast" aria-label="Ativar alto contraste">🌓 Contraste</button>
                <button id="btn-font-up" aria-label="Aumentar fonte">A+</button>
                <button id="btn-font-down" aria-label="Diminuir fonte">A-</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero scroll-reveal" aria-labelledby="hero-title">
            <h1 id="hero-title">Explore o Panteão Grego</h1>
            <p>Deuses, heróis e monstros em uma experiência acessível e moderna.</p>
        </section>

        <section id="gods-section" class="scroll-reveal" aria-labelledby="gods-title">
            <h2 id="gods-title">Principais Divindades</h2>
            <div id="gods-grid" class="grid-container">
                </div>
        </section>

        <section id="myths-section" class="scroll-reveal" aria-labelledby="myths-title">
            <h2 id="myths-title">Mitos Famosos</h2>
            <div id="accordion-container">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Olimpo Digital. Desenvolvido com foco em Acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
